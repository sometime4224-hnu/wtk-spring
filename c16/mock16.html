    <style>

        button {

        .topbar {

            z-index: 40;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            padding: 0 14px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.34);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            font-size: 13px;
            font-weight: 800;
        }

        .topbar a {
            color: #1d4ed8;
            text-decoration: none;
        }

        .topbar strong {
            overflow: hidden;
            color: #0f172a;
            text-overflow: ellipsis;

        }

        .shell {

        .panel {

            line-height: 1.25;

        .badge,

            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            border-radius: 999px;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 900;

            font-weight: 900;

            font-size: 20px;
            font-weight: 900;
        }

            height: 10px;
            border-radius: 999px;
            background: #e2e8f0;

            display: block;
            width: var(--value, 0%);
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #2563eb, #059669);

            background: #fff1f2;

            cursor: not-allowed;

            align-items: start;
            margin-top: 12px;

            top: 56px;

            gap: 10px;

            display: grid;
            place-items: center;
            aspect-ratio: 1;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            background: #ffffff;
            color: #334155;
            cursor: pointer;
            font-size: 11px;
            font-weight: 900;
        }

        .nav-dot.is-answered {
            border-color: #bfdbfe;
            background: #eff6ff;
            color: #1d4ed8;
        }

        .nav-dot.is-current {
            border-color: var(--green);
            background: var(--green-soft);
            color: #047857;

        .nav-dot.is-wrong {
            border-color: #fecaca;
            background: var(--red-soft);
            color: #b91c1c;
        }

            display: grid;
            gap: 10px;

            gap: 10px;

            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;

            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 30px;
            border-radius: 999px;
            background: #0f172a;
            color: #ffffff;
            font-size: 12px;
            font-weight: 900;
        }

        .q-prompt {
            margin: 0;
            font-size: 17px;
            font-weight: 900;
            line-height: 1.5;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .q-context {
            margin: 0;
            color: #475569;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.45;
        }

        .q-media {
            display: grid;
            grid-template-columns: 88px minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            margin: 0;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px;
            background: #f8fafc;
        }

        .q-media img,
        .q-media__emoji {
            width: 88px;
            aspect-ratio: 1;
            border-radius: 7px;
            background: #ffffff;
        }

        .q-media img {
            display: block;
            object-fit: cover;
            border: 1px solid #e2e8f0;
        }

        .q-media__emoji {
            display: grid;
            place-items: center;
            border: 1px solid #dbeafe;
            font-size: 42px;
        }

        .q-media figcaption {
            color: #334155;
            font-size: 13px;
            font-weight: 900;
            line-height: 1.4;
            word-break: keep-all;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .option {
            display: grid;
            grid-template-columns: 28px 1fr;
            gap: 8px;
            align-items: start;
            min-height: 54px;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 9px;
            background: #ffffff;
            color: var(--ink);
            cursor: pointer;
            text-align: left;
        }

        .option strong {
            display: grid;
            place-items: center;
            width: 28px;
            height: 28px;
            border-radius: 999px;
            background: #f1f5f9;
            color: #334155;
            font-size: 12px;
            font-weight: 900;
        }

        .option span {
            align-self: center;
            min-width: 0;
            font-size: 14px;
            font-weight: 800;
            line-height: 1.45;
            word-break: keep-all;
            overflow-wrap: break-word;
        }

        .option.is-selected {
            border-color: var(--blue);
            background: #eff6ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .option.is-correct {
            border-color: var(--green);
            background: var(--green-soft);
        }

        .option.is-wrong {
            border-color: var(--red);
            background: var(--red-soft);
        }

        .feedback {
            display: none;
            border-radius: 8px;
            padding: 10px;
            background: #f8fafc;
            color: #334155;
            font-size: 13px;
            font-weight: 800;
            line-height: 1.45;
        }

        .feedback.is-visible {
            display: block;
        }

        .footer {
            margin-top: 12px;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .nav-panel {
                position: static;
            }

            .question-nav {
                grid-template-columns: repeat(10, minmax(0, 1fr));

        @media (max-width: 620px) {
            body {
                background: #ffffff;

            .topbar {

            .shell {

            .exam-head {

                display: block;
                border-width: 1px 0 0;

                padding: 6px;

            .exam-head .head-row,

                display: none;

            .exam-head .toolbar {
                display: block;

                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 6px;
            }

            #resumeBtn {
                display: none;
            }

            .exam-head .btn {
                min-height: 38px;
                border-radius: 8px;
                padding: 0 6px;
                font-size: 12px;
            }

            .layout {
                display: block;
                margin-top: 0;
            }

            .nav-panel {
                position: sticky;
                top: 0;
                z-index: 35;
                border-width: 0 0 1px;

                padding: 4px 5px;
                background: rgba(255, 255, 255, 0.97);
                box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
                backdrop-filter: blur(12px);
            }

            .nav-panel .meta-row {
                display: none;
            }

            .question-nav {
                display: flex;
                grid-template-columns: none;
                gap: 3px;
                overflow-x: auto;
                padding: 1px 0 2px;
                scrollbar-width: none;
            }

            .question-nav::-webkit-scrollbar {
                display: none;
            }

            .nav-dot {
                flex: 0 0 24px;
                width: 24px;
                height: 24px;
                border-radius: 5px;
                font-size: 10px;
                aspect-ratio: auto;
            }

            .question-list {
                gap: 8px;
                padding: 7px;
            }

            .question-card {
                gap: 8px;
                border-radius: 7px;
                padding: 10px;
                scroll-margin-top: 36px;
                box-shadow: none;
            }

            .question-card.is-current {
                outline: 2px solid rgba(37, 99, 235, 0.12);
            }

            .q-head {
                justify-content: flex-start;
                gap: 5px;
            }

            .q-head .badge,
            .q-head .chip {
                display: none;
            }

            .q-number {
                min-width: 30px;
                height: 24px;
                border-radius: 6px;
                font-size: 11px;
            }

            .q-prompt {
                font-size: 15px;
                line-height: 1.38;
            }

            .q-context {
                font-size: 12px;
                line-height: 1.34;
            }

            .q-media {
                grid-template-columns: 56px minmax(0, 1fr);
                gap: 7px;
                padding: 6px;
            }

            .q-media img,
            .q-media__emoji {
                width: 56px;
                border-radius: 6px;
            }

            .q-media__emoji {
                font-size: 30px;
            }

            .q-media figcaption {
                font-size: 12px;
                line-height: 1.32;
            }

            .stats,
            .options {
                grid-template-columns: 1fr;
            }

            .options {
                gap: 6px;
            }

            .option {
                grid-template-columns: 24px 1fr;
                min-height: 42px;
                gap: 7px;
                padding: 7px;
            }

            .option strong {
                width: 24px;
                height: 24px;
                font-size: 11px;
            }

            .option span {
                font-size: 13px;
                line-height: 1.34;
            }

            .feedback {
                padding: 8px;
                font-size: 12px;
                line-height: 1.36;
            }

            .footer {
                display: none;
            }
        }

            { id: 'v01', section: '어휘', skill: '악기', prompt: '건반을 손가락으로 눌러 연주하는 악기는 무엇입니까?', context: '검은 건반과 흰 건반이 있습니다.', choices: ['피아노', '바이올린', '트럼펫', '드럼'], answer: 0, explain: '피아노는 건반을 눌러 연주하는 악기입니다.' },

            { id: 'v04', section: '어휘', skill: '악기', prompt: '줄을 손가락이나 피크로 튕겨서 연주하는 악기는 무엇입니까?', context: '손에 들고 줄을 튕깁니다.', choices: ['기타', '트럼펫', '피아노', '드럼'], answer: 0, explain: '기타는 줄을 튕겨서 연주하는 악기입니다.' },
            { id: 'v05', section: '어휘', skill: '악기', prompt: '채로 치거나 손으로 쳐서 연주하는 악기는 무엇입니까?', context: '여러 개의 북과 심벌즈가 함께 있습니다.', choices: ['드럼', '바이올린', '트럼펫', '기타'], answer: 0, explain: '드럼은 치면서 연주하는 악기입니다.' },

            { id: 'g19', section: '문법', skill: 'N(으)로 유명하다', prompt: '중국을 대표하는 상징으로 만리장성을 말하고 싶어요.', context: '대표 명사를 이유로 말합니다.', choices: ['중국은 만리장성으로 유명해요.', '중국은 만리장성으로 유명했어요.', '중국은 만리장성을 유명해요.', '중국은 만리장성에 유명해요.'], answer: 0, explain: '대표 명사 “만리장성”을 이유로 말하므로 “으로 유명해요”가 맞습니다.' },
            { id: 'g20', section: '문법', skill: 'A/V-기로 유명하다', prompt: '이 식당은 줄이 길 정도로 맛있다고 잘 알려져 있어요.', context: '현재의 특징/평가입니다.', choices: ['이 식당은 맛있기로 유명해요.', '이 식당은 맛있기로 유명했어요.', '이 식당은 맛을 있기로 유명해요.', '이 식당은 맛있기로 유명한 해요.'], answer: 0, explain: '맛있다는 평가로 유명하면 “맛있기로 유명해요”가 자연스럽습니다.' }
        ];

        let state = loadState() || createAttempt();
        let currentId = state.questionOrder[0];

        const questionList = document.getElementById('questionList');
        const questionNav = document.getElementById('questionNav');
        const answeredStat = document.getElementById('answeredStat');
        const scoreStat = document.getElementById('scoreStat');
        const totalStat = document.getElementById('totalStat');
        const progressBar = document.getElementById('progressBar');
        const saveBadge = document.getElementById('saveBadge');
        const balanceStat = document.getElementById('balanceStat');
        const attemptChip = document.getElementById('attemptChip');
        const submitBtn = document.getElementById('submitBtn');
        const newAttemptBtn = document.getElementById('newAttemptBtn');
        const resumeBtn = document.getElementById('resumeBtn');

        function shuffle(items) {
            const copy = [...items];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function balancedPositions(count) {
            const positions = [];
            for (let i = 0; i < count; i++) positions.push(i % 4);
            return shuffle(positions);
        }

        function createOptionOrder(question, desiredCorrectPosition) {
            const indices = question.choices.map((_, index) => index);
            const distractors = shuffle(indices.filter((index) => index !== question.answer));
            const order = [];
            for (let i = 0; i < question.choices.length; i++) {
                order[i] = i === desiredCorrectPosition ? question.answer : distractors.shift();
            }
            return order;
        }

        function createAttempt() {
            const questionOrder = questions.map((question) => question.id);
            const positions = balancedPositions(questionOrder.length);
            const optionOrders = {};
            questionOrder.forEach((id, index) => {
                const question = getQuestion(id);
                optionOrders[id] = createOptionOrder(question, positions[index]);
            });
            return {
                version: 1,
                attemptId: Date.now().toString(36),
                startedAt: Date.now(),
                updatedAt: Date.now(),
                submitted: false,
                questionOrder,
                optionOrders,
                answers: {}
            };
        }

        function getQuestion(id) {
            return questions.find((question) => question.id === id);
        }

        function validState(candidate) {
            if (!candidate || candidate.version !== 1) return false;
            if (!Array.isArray(candidate.questionOrder) || candidate.questionOrder.length !== questions.length) return false;
            return candidate.questionOrder.every((id) => getQuestion(id) && Array.isArray(candidate.optionOrders?.[id]));
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (!saved) return null;
                const parsed = JSON.parse(saved);
                return validState(parsed) ? parsed : null;
            } catch (error) {
                return null;
            }
        }

        function saveState() {
            state.updatedAt = Date.now();
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                saveBadge.className = 'badge is-save';
                saveBadge.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> 자동저장됨';
            } catch (error) {
                saveBadge.className = 'badge is-warn';
                saveBadge.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> 저장 실패';
            }
        }

        function correctOptionPosition(id) {
            const question = getQuestion(id);
            return state.optionOrders[id].findIndex((choiceIndex) => choiceIndex === question.answer);
        }

        function correctDistribution() {
            const counts = [0, 0, 0, 0];
            state.questionOrder.forEach((id) => {
                counts[correctOptionPosition(id)] += 1;
            });
            return counts;
        }

        function answeredCount() {
            return Object.keys(state.answers).filter((id) => state.answers[id] !== undefined).length;
        }

        function score() {
            return state.questionOrder.reduce((sum, id) => {
                const question = getQuestion(id);
                return sum + (state.answers[id] === question.answer ? 1 : 0);
            }, 0);
        }

        function renderMedia(question) {
            if (!question.media) return '';
            const caption = question.media.caption || '';
            const visual = question.media.type === 'image'
                ? `<img src="${question.media.src}" alt="${question.media.alt || caption}" />`
                : `<div class="q-media__emoji" aria-hidden="true">${question.media.symbol}</div>`;
            return `
                <figure class="q-media">
                    ${visual}
                    <figcaption>${caption}</figcaption>
                </figure>
            `;
        }

        function selectAnswer(id, choiceIndex) {
            if (state.submitted) return;
            state.answers[id] = choiceIndex;
            currentId = id;
            saveState();
            render();
        }

        function submitExam() {
            state.submitted = true;
            saveState();
            render();
            const firstWrong = state.questionOrder.find((id) => state.answers[id] !== getQuestion(id).answer);
            if (firstWrong) scrollToQuestion(firstWrong);
        }

        function newAttempt() {
            state = createAttempt();
            currentId = state.questionOrder[0];
            saveState();
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restoreAttempt() {
            state = loadState() || createAttempt();
            currentId = state.questionOrder.find((id) => state.answers[id] === undefined) || state.questionOrder[0];
            render();
            scrollToQuestion(currentId);
        }

        function scrollToQuestion(id) {
            document.getElementById(`q-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderStats() {
            const answered = answeredCount();
            const total = questions.length;
            totalStat.textContent = total;
            answeredStat.textContent = answered;
            scoreStat.textContent = state.submitted ? `${score()} / ${total}` : '-';
            progressBar.style.setProperty('--value', `${Math.round(answered / total * 100)}%`);
            balanceStat.textContent = correctDistribution().join('/');
            attemptChip.textContent = `저장 ${new Date(state.updatedAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}`;
            submitBtn.disabled = answered < total;
        }

        function optionClass(id, choiceIndex) {
            const question = getQuestion(id);
            const selected = state.answers[id] === choiceIndex;
            if (!state.submitted) return selected ? 'is-selected' : '';
            if (choiceIndex === question.answer) return 'is-correct';
            if (selected) return 'is-wrong';
            return '';
        }

        function renderQuestions() {
            questionList.innerHTML = state.questionOrder.map((id, index) => {
                const question = getQuestion(id);
                const selected = state.answers[id];
                const isCurrent = currentId === id;
                const feedbackVisible = state.submitted ? 'is-visible' : '';
                return `
                    <article class="question-card panel ${isCurrent ? 'is-current' : ''}" id="q-${id}">
                        <div class="q-head">
                            <span class="q-number">${index + 1}</span>
                            <span class="badge">${question.section}</span>
                            <span class="chip">${question.skill}</span>
                        </div>
                        <p class="q-prompt">${question.prompt}</p>
                        <p class="q-context">${question.context}</p>
                        ${renderMedia(question)}
                        <div class="options">
                            ${state.optionOrders[id].map((choiceIndex, optionIndex) => `
                                <button class="option ${optionClass(id, choiceIndex)}" type="button" data-question="${id}" data-choice="${choiceIndex}">
                                    <strong>${OPTION_LABELS[optionIndex]}</strong>
                                    <span>${question.choices[choiceIndex]}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div class="feedback ${feedbackVisible}">
                            ${selected === question.answer ? '정답입니다.' : `정답: ${question.choices[question.answer]}`} ${question.explain}
                        </div>
                    </article>
                `;
            }).join('');

            questionList.querySelectorAll('[data-question]').forEach((button) => {
                button.addEventListener('click', () => {
                    selectAnswer(button.dataset.question, Number(button.dataset.choice));
                });
            });
        }

        function renderNav() {
            questionNav.innerHTML = state.questionOrder.map((id, index) => {
                const question = getQuestion(id);
                const answered = state.answers[id] !== undefined;
                const wrong = state.submitted && state.answers[id] !== question.answer;
                return `
                    <button class="nav-dot ${answered ? 'is-answered' : ''} ${currentId === id ? 'is-current' : ''} ${wrong ? 'is-wrong' : ''}" type="button" data-jump="${id}">
                        ${index + 1}
                    </button>
                `;
            }).join('');

            questionNav.querySelectorAll('[data-jump]').forEach((button) => {
                button.addEventListener('click', () => {
                    currentId = button.dataset.jump;
                    render();
                    scrollToQuestion(currentId);
                });
            });

            questionNav.querySelector('.is-current')?.scrollIntoView({ block: 'nearest', inline: 'center' });
        }

        function render() {
            renderStats();
            renderQuestions();
            renderNav();
            saveBadge.innerHTML = state.submitted
                ? '<i class="fa-solid fa-lock"></i> 채점 완료'
                : '<i class="fa-solid fa-cloud-arrow-up"></i> 자동저장됨';
        }

        submitBtn.addEventListener('click', submitExam);
        newAttemptBtn.addEventListener('click', newAttempt);
        resumeBtn.addEventListener('click', restoreAttempt);

        saveState();
        render();
    </script>
    <script src="../shared/site-copyright.js"></script>
</body>
</html>
